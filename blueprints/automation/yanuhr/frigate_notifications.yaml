blueprint:
  name: Frigate – mobilné notifikácie (reviews)
  description: >
    Posiela push notifikácie do mobilnej aplikácie pri review udalostiach z Frigate.
    Reaguje na MQTT topic frigate/reviews (odporúčaný smer pre notifikácie), filtruje podľa kamery,
    objektov (data.objects) a voliteľne zóny (data.zones). Obrázok cez HA endpoint /api/frigate/notifications/...
    Jedna notifikácia na review (typ end alebo new podľa voľby), s cooldown po odoslaní.
  domain: automation

  input:
    frigate_camera_name:
      name: Názov kamery vo Frigate
      description: Presný názov kamery podľa Frigate config (napr. ulicka, front_cam).
      selector:
        text: {}

    notify_service:
      name: Notify služba
      description: Služba pre push notifikáciu (napr. notify.mobile_app_jan).
      selector:
        text: {}

    object_labels:
      name: Objekty spúšťajúce notifikáciu
      description: Notifikácia sa odošle, ak review obsahuje aspoň jeden z týchto objektov (data.objects).
      default:
        - person
        - car
      selector:
        select:
          options:
            - person
            - car
            - dog
            - cat
            - bird
            - bicycle
            - motorcycle
            - bus
            - truck
          multiple: true

    notification_title:
      name: Titulok notifikácie
      description: >
        Placeholdery: {{ camera_name }}, {{ label }} (zoznam objektov z review, napr. person, car).
      default: "Frigate: {{ camera_name }}"
      selector:
        text: {}

    message_template:
      name: Text správy
      description: >
        Placeholdery: {{ camera_name }}, {{ label }} (objekty z review).
      default: "Detekované: {{ label }} ({{ camera_name }})"
      selector:
        text: {}

    cooldown_seconds:
      name: Cooldown (sekúnd)
      description: Po odoslaní notifikácie sa ďalšia neodošle skôr ako po tejto dobe.
      default: 30
      selector:
        number:
          min: 0
          max: 600
          step: 5

    zone_filter:
      name: Zóna (voliteľné)
      description: Ak je vyplnené, notifikácia len ak review obsahuje túto zónu v data.zones.
      default: ""
      selector:
        text: {}

    image_type:
      name: Typ obrázka
      description: Thumbnail alebo snapshot. Obrázok z prvého event_id v data.detections.
      default: snapshot
      selector:
        select:
          options:
            - thumbnail
            - snapshot

    home_assistant_url:
      name: Home Assistant URL (pre obrázok)
      description: >
        Základná URL HA (bez lomítka). Pre mobil potrebná na stiahnutie obrázka.
      default: ""
      selector:
        text: {}

    event_type_filter:
      name: Typ review správy
      description: >
        "end" = jedna notifikácia po skončení review. "new" = hneď pri začatí (môže byť viac).
      default: end
      selector:
        select:
          options:
            - end
            - new

    severity_filter:
      name: Severity (voliteľné)
      description: >
        Notifikácia len keď review má zvolenú severity (after.severity).
        "Bez filtra" = akákoľvek severity, "detection" / "alert" = len táto.
      default: any
      selector:
        select:
          options:
            - any
            - detection
            - alert

    click_action:
      name: Klik – URL (voliteľné)
      description: URL alebo lovelace path po kliknutí na notifikáciu.
      default: ""
      selector:
        text: {}

trigger:
  - platform: mqtt
    topic: frigate/reviews

variables:
  # 1) Payload parsing – frigate/reviews: { type, before, after }; before/after majú id, camera, severity, data: { detections[], objects[], zones[] }
  event_data: >-
    {{ (trigger.payload if trigger.payload is mapping else (trigger.payload or '{}') | from_json(default={})) | default({}) }}
  after_data: "{{ (event_data.get('after') if event_data.get('after') is mapping else event_data) | default(event_data) }}"
  before_data: "{{ (event_data.get('before') if event_data.get('before') is mapping else {}) | default({}) }}"
  review_data: "{{ (after_data.get('data') if after_data.get('data') is mapping else {}) | default({}) }}"
  before_review_data: "{{ (before_data.get('data') if before_data.get('data') is mapping else {}) | default({}) }}"

  camera_name: "{{ (after_data.get('camera') or event_data.get('camera') or '') | string }}"
  event_type: "{{ (event_data.get('type') or event_data.get('event_type') or '') | string }}"
  severity: "{{ (after_data.get('severity') or '') | string }}"

  objects_list: "{{ (review_data.get('objects') if (review_data.get('objects') is iterable and review_data.get('objects') is not string) else []) | default([]) }}"
  zones_list: "{{ (review_data.get('zones') if (review_data.get('zones') is iterable and review_data.get('zones') is not string) else []) | default([]) }}"
  detections_after: "{{ (review_data.get('detections') if (review_data.get('detections') is iterable and review_data.get('detections') is not string) else []) | default([]) }}"
  detections_before: "{{ (before_review_data.get('detections') if (before_review_data.get('detections') is iterable and before_review_data.get('detections') is not string) else []) | default([]) }}"
  event_id: "{{ ((detections_after | first) or (detections_before | first) or '') | string }}"

  # 2) Mapovanie blueprint inputs cez !input
  inp_camera_name: !input frigate_camera_name
  inp_notify_service: !input notify_service
  inp_object_labels: !input object_labels
  inp_notification_title: !input notification_title
  inp_message_template: !input message_template
  inp_cooldown_seconds: !input cooldown_seconds
  inp_zone_filter: !input zone_filter
  inp_image_type: !input image_type
  inp_click_action: !input click_action
  inp_event_type_filter: !input event_type_filter
  inp_severity_filter: !input severity_filter
  inp_home_assistant_url: !input home_assistant_url

  # 3) Odvodené premenné (používajú inp_* a payload premenné)
  has_matching_object: >-
    {% set ns = namespace(found=0) %}
    {% for o in (objects_list or []) %}
      {% if o in inp_object_labels %}{% set ns.found = 1 %}{% endif %}
    {% endfor %}
    {{ ns.found }}
  label_display: "{{ (objects_list or []) | join(', ') | default('') }}"
  title_rendered: "{{ inp_notification_title | replace('{{ camera_name }}', camera_name) | replace('{{ label }}', label_display) }}"
  message_rendered: "{{ inp_message_template | replace('{{ camera_name }}', camera_name) | replace('{{ label }}', label_display) }}"
  image_url: >-
    {% if event_id %}
      {% set base = (inp_home_assistant_url or '') | trim %}
      {% set base = base[:-1] if base.endswith('/') else base %}
      {% if base %}
        {{ base }}/api/frigate/notifications/{{ event_id }}/{{ inp_image_type }}.jpg
      {% else %}
        /api/frigate/notifications/{{ event_id }}/{{ inp_image_type }}.jpg
      {% endif %}
    {% else %}
      ''
    {% endif %}

condition:
  - condition: template
    value_template: "{{ camera_name == inp_camera_name }}"
  - condition: template
    value_template: "{{ (has_matching_object | int) == 1 }}"
  - condition: template
    value_template: "{{ event_type == inp_event_type_filter }}"
  - condition: template
    value_template: "{{ inp_zone_filter == '' or (zones_list is iterable and zones_list is not string and inp_zone_filter in zones_list) }}"
  - condition: template
    value_template: "{{ (inp_severity_filter | default('any')) == 'any' or severity == inp_severity_filter }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ image_url != '' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (inp_click_action | default('') | trim) != '' }}"
                sequence:
                  - service: "{{ inp_notify_service | string }}"
                    data:
                      title: "{{ title_rendered }}"
                      message: "{{ message_rendered }}"
                      data:
                        image: "{{ image_url }}"
                        clickAction: "{{ inp_click_action | trim }}"
                        tag: "frigate-review-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
              - conditions:
                  - condition: template
                    value_template: "{{ (inp_click_action | default('') | trim) == '' }}"
                sequence:
                  - service: "{{ inp_notify_service | string }}"
                    data:
                      title: "{{ title_rendered }}"
                      message: "{{ message_rendered }}"
                      data:
                        image: "{{ image_url }}"
                        tag: "frigate-review-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
      - conditions:
          - condition: template
            value_template: "{{ image_url == '' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (inp_click_action | default('') | trim) != '' }}"
                sequence:
                  - service: "{{ inp_notify_service | string }}"
                    data:
                      title: "{{ title_rendered }}"
                      message: "{{ message_rendered }}"
                      data:
                        clickAction: "{{ inp_click_action | trim }}"
                        tag: "frigate-review-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
              - conditions:
                  - condition: template
                    value_template: "{{ (inp_click_action | default('') | trim) == '' }}"
                sequence:
                  - service: "{{ inp_notify_service | string }}"
                    data:
                      title: "{{ title_rendered }}"
                      message: "{{ message_rendered }}"
                      data:
                        tag: "frigate-review-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
  - if:
      - condition: template
        value_template: "{{ (inp_cooldown_seconds | int) > 0 }}"
    then:
      - delay:
          seconds: "{{ inp_cooldown_seconds | int }}"

mode: single
