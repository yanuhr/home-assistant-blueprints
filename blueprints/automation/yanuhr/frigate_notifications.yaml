blueprint:
  name: Frigate – mobilné notifikácie (eventy)
  description: >
    Posiela push notifikácie do mobilnej aplikácie pri eventoch z Frigate.
    Reaguje na MQTT topic frigate/events, filtruje podľa kamery (after.camera), labelu (after.label),
    voliteľne zóny (after.current_zones / entered_zones) a severity (after.max_severity).
    Obrázok cez HA endpoint /api/frigate/notifications/{event_id}/{image_type}.jpg ak má event snapshot.
  domain: automation

  input:
    frigate_camera_name:
      name: Názov kamery vo Frigate
      description: Presný názov kamery podľa Frigate config (napr. ulicka, front_cam).
      selector:
        text: {}

    notify_service:
      name: Notify služba
      description: Služba pre push notifikáciu (napr. notify.mobile_app_jan).
      selector:
        text: {}

    object_labels:
      name: Objekty spúšťajúce notifikáciu
      description: Notifikácia sa odošle, ak after.label je v zozname (napr. person, car).
      default:
        - person
        - car
      selector:
        select:
          options:
            - person
            - car
            - dog
            - cat
            - bird
            - bicycle
            - motorcycle
            - bus
            - truck
          multiple: true

    notification_title:
      name: Titulok notifikácie
      description: Placeholdery {{ camera_name }}, {{ label }}.
      default: "Frigate: {{ camera_name }}"
      selector:
        text: {}

    message_template:
      name: Text správy
      description: Placeholdery {{ camera_name }}, {{ label }}.
      default: "Detekované: {{ label }} ({{ camera_name }})"
      selector:
        text: {}

    cooldown_seconds:
      name: Cooldown (sekúnd)
      description: Po odoslaní notifikácie sa ďalšia neodošle skôr ako po tejto dobe.
      default: 30
      selector:
        number:
          min: 0
          max: 600
          step: 5

    zone_filter:
      name: Zóna (voliteľné)
      description: Ak je vyplnené, notifikácia len ak zóna je v after.current_zones alebo after.entered_zones.
      default: ""
      selector:
        text: {}

    image_type:
      name: Typ obrázka
      description: Thumbnail alebo snapshot. Obrázok z after.id, len ak after.has_snapshot je true.
      default: snapshot
      selector:
        select:
          options:
            - thumbnail
            - snapshot

    home_assistant_url:
      name: Home Assistant URL (pre obrázok)
      description: Základná URL HA (bez lomítka). Pre mobil potrebná na stiahnutie obrázka.
      default: ""
      selector:
        text: {}

    event_type_filter:
      name: Typ eventu
      description: >
        end = jedna notifikácia po skončení, new = hneď pri detekcii.
      default: end
      selector:
        select:
          options:
            - end
            - new

    severity_filter:
      name: Severity (voliteľné)
      description: >
        Notifikácia len keď after.max_severity sedí. any = bez filtra.
      default: any
      selector:
        select:
          options:
            - any
            - detection
            - alert

    click_action:
      name: Klik – URL (voliteľné)
      description: Pri režime custom_click_action sa použije táto URL po kliknutí.
      default: ""
      selector:
        text: {}

    click_behavior:
      name: Správanie po kliknutí
      description: >
        open_image = otvorí obrázok snapshotu (Android clickAction, iOS url).
        custom_click_action = použije pole Klik – URL vyššie.
        no_action = žiadna akcia po kliknutí.
      default: open_image
      selector:
        select:
          options:
            - open_image
            - custom_click_action
            - no_action

trigger:
  - platform: mqtt
    topic: frigate/events

variables:
  # 1) Payload parsing – MQTT JSON z frigate/events: { type, before, after }
  event_data: "{{ trigger.payload_json | default({}, true) }}"
  after_data: "{{ (event_data.get('after') if event_data.get('after') is mapping else {}) | default({}) }}"
  before_data: "{{ (event_data.get('before') if event_data.get('before') is mapping else {}) | default({}) }}"

  camera_name: "{{ (after_data.get('camera') or event_data.get('camera') or '') | string }}"
  event_type: "{{ (event_data.get('type') or '') | string }}"
  label: "{{ (after_data.get('label') or '') | string }}"
  severity: "{{ (after_data.get('max_severity') or '') | string }}"
  event_id: "{{ (after_data.get('id') or '') | string }}"
  has_snapshot: "{{ 1 if after_data.get('has_snapshot') else 0 }}"

  zones_list: "{{ (after_data.get('current_zones') if (after_data.get('current_zones') is iterable and after_data.get('current_zones') is not string) else []) | default([]) }}"
  entered_zones_list: "{{ (after_data.get('entered_zones') if (after_data.get('entered_zones') is iterable and after_data.get('entered_zones') is not string) else []) | default([]) }}"

  # 2) Mapovanie blueprint inputs cez !input
  inp_camera_name: !input frigate_camera_name
  inp_notify_service: !input notify_service
  inp_object_labels: !input object_labels
  inp_notification_title: !input notification_title
  inp_message_template: !input message_template
  inp_cooldown_seconds: !input cooldown_seconds
  inp_zone_filter: !input zone_filter
  inp_image_type: !input image_type
  inp_click_action: !input click_action
  inp_click_behavior: !input click_behavior
  inp_event_type_filter: !input event_type_filter
  inp_severity_filter: !input severity_filter
  inp_home_assistant_url: !input home_assistant_url

  # 3) Odvodené premenné
  has_matching_object: "{{ (1 if label in inp_object_labels else 0) }}"
  label_display: "{{ label }}"
  title_rendered: "{{ inp_notification_title | replace('{{ camera_name }}', camera_name) | replace('{{ label }}', label_display) }}"
  message_rendered: "{{ inp_message_template | replace('{{ camera_name }}', camera_name) | replace('{{ label }}', label_display) }}"
  image_url: >-
    {% if event_id and (has_snapshot | int) == 1 %}
      {% set base = (inp_home_assistant_url or '') | trim %}
      {% set base = base[:-1] if base.endswith('/') else base %}
      {{ (base + '/api/frigate/notifications/' + event_id + '/' + inp_image_type + '.jpg') if base else ('/api/frigate/notifications/' + event_id + '/' + inp_image_type + '.jpg') }}
    {% else %}
      ''
    {% endif %}
  resolved_click_url: "{{ (image_url if inp_click_behavior == 'open_image' else (inp_click_action | default('') | trim)) if (inp_click_behavior == 'open_image' and image_url != '') or (inp_click_behavior == 'custom_click_action' and (inp_click_action | default('') | trim) != '') else '' }}"

condition:
  - condition: template
    value_template: "{{ camera_name == inp_camera_name }}"
  - condition: template
    value_template: "{{ (has_matching_object | int) == 1 }}"
  - condition: template
    value_template: "{{ event_type == inp_event_type_filter }}"
  - condition: template
    value_template: "{{ inp_zone_filter == '' or (inp_zone_filter in (zones_list or []) or inp_zone_filter in (entered_zones_list or [])) }}"
  - condition: template
    value_template: "{{ (inp_severity_filter | default('any')) == 'any' or severity == inp_severity_filter }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ image_url != '' and (resolved_click_url | trim) != '' }}"
        sequence:
          - service: "{{ inp_notify_service | string }}"
            data:
              title: "{{ title_rendered }}"
              message: "{{ message_rendered }}"
              data:
                image: "{{ image_url }}"
                clickAction: "{{ resolved_click_url }}"
                url: "{{ resolved_click_url }}"
                tag: "frigate-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
      - conditions:
          - condition: template
            value_template: "{{ image_url != '' and (resolved_click_url | trim) == '' }}"
        sequence:
          - service: "{{ inp_notify_service | string }}"
            data:
              title: "{{ title_rendered }}"
              message: "{{ message_rendered }}"
              data:
                image: "{{ image_url }}"
                tag: "frigate-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
      - conditions:
          - condition: template
            value_template: "{{ image_url == '' and (resolved_click_url | trim) != '' }}"
        sequence:
          - service: "{{ inp_notify_service | string }}"
            data:
              title: "{{ title_rendered }}"
              message: "{{ message_rendered }}"
              data:
                clickAction: "{{ resolved_click_url }}"
                url: "{{ resolved_click_url }}"
                tag: "frigate-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
      - conditions:
          - condition: template
            value_template: "{{ image_url == '' and (resolved_click_url | trim) == '' }}"
        sequence:
          - service: "{{ inp_notify_service | string }}"
            data:
              title: "{{ title_rendered }}"
              message: "{{ message_rendered }}"
              data:
                tag: "frigate-{{ inp_camera_name }}-{{ inp_cooldown_seconds }}"
  - if:
      - condition: template
        value_template: "{{ (inp_cooldown_seconds | int) > 0 }}"
    then:
      - delay:
          seconds: "{{ inp_cooldown_seconds | int }}"

mode: single
